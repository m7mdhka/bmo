version: "3.9"

services:
  backend:
    build:
      context: ..
      dockerfile: backend/docker/Dockerfile
    container_name: bmo-backend
    ports:
      - "8000:8000"
    environment:
      BMO_TEMPLATES_ROOT: /app/templates
    volumes:
      - ../backend:/app/backend
      - ../templates:/app/templates
      - ${HOME}/.bmo:/root/.bmo
      - ${HOME}/bmo-projects:/root/bmo-projects
      - /var/run/docker.sock:/var/run/docker.sock

  frontend:
    build:
      context: ..
      dockerfile: frontend/docker/Dockerfile
    container_name: bmo-frontend
    ports:
      - "3000:3000"
    environment:
      BMO_ORCHESTRATOR_URL: http://backend:8000
    depends_on:
      - backend
    volumes:
      - ../frontend:/app/frontend

# Usage (from repo root):
#   docker compose -f docker/docker-compose.yml up --build
